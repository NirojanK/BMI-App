<!Doctype HTML>
<html>
<head>
<title>BMI cal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <h1>BMI calculator</h1>
    <div class ="fill"><img src ="images/cscale.jpg" alt="BMI Scale" style="width: 75%; height: auto;"></div>
<label>Unit System:</label>
<br></br>
<div class ="line"></div>

<label><h3>Weight:</h3></label>
<input type ="number" id="weight">

<label><h3>Unit System:</h3></label>
<select id="unit" onchange="toggleUnits()">
    <option value="metric">Metric (kg / meters)</option>
    <option value="imperial">Imperial (lbs / feet & inches)</option>
</select>

<br><br>

<div id="metricInputs" class ="fade show">
    <label><h3>Height</h3> (meters):</label>
    <input type="number" id="height">
</div>

<div id="imperialInputs" class = "fade">
    <label>Feet:</label>
    <input type="number" id="feet">

    <label>Inches:</label>
    <input type="number" id="inches">
</div>

<br></br>

<button onClick="calculateBMI()"><b>Calculate BMI</b> </button>

<h2 id = "result"></h2>
<div class="scale">
<p>Underweight: < 18.5</p>
<p>Normal: 18.5 – 24.9</p>
<p>Overweight: 25 – 29.9</p>
<p>Obese: 30+</p>
</div>
</div>
<script src="script.js"></script>

</body>
</html>

</body>
</html>
